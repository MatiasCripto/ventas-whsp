# ── Concierge AI Docker Compose ─────────────────────────────
# Full stack: Evolution API + Redis
# Next.js app runs locally via `npm run dev`

volumes:
  evolution_data:
  redis_data:
  postgres_data:

networks:
  concierge-net:
    driver: bridge

services:

  # ──────────────────────────────────────────
  # PostgreSQL — Evolution API database
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: whsp_postgres
    restart: unless-stopped
    networks: [concierge-net]
    environment:
      POSTGRES_DB:       evolution
      POSTGRES_USER:     evolution
      POSTGRES_PASSWORD: evolution_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Redis — Evolution API message queue & cache
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whsp_redis
    restart: unless-stopped
    networks: [concierge-net]
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Evolution API — WhatsApp gateway
  # Runs at http://localhost:8080
  # ──────────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: whsp_evolution
    restart: unless-stopped
    networks: [concierge-net]
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_URL:               ${EVOLUTION_API_URL:-http://localhost:8080}
      # Authentication
      AUTHENTICATION_TYPE:      apikey
      AUTHENTICATION_API_KEY:   ${EVOLUTION_API_KEY:?err}
      # Database — PostgreSQL via Prisma
      DATABASE_ENABLED:         true
      DATABASE_CONNECTION_URI:  postgresql://evolution:evolution_pass@postgres:5432/evolution?schema=public
      DATABASE_PROVIDER:        postgresql
      # Redis
      CACHE_REDIS_ENABLED:      true
      CACHE_REDIS_URI:          redis://:${REDIS_PASSWORD:-redispass}@redis:6379/6
      CACHE_REDIS_PREFIX_KEY:   evolution
      # Storage — use local for simplicity
      STORAGE_TYPE:             local
      # Webhook defaults (each instance overrides)
      WEBHOOK_GLOBAL_URL:       http://host.docker.internal:3010/api/webhooks/whatsapp
      WEBHOOK_GLOBAL_ENABLED:   true
      WEBHOOK_EVENTS_MESSAGES_UPSERT: true
      WEBHOOK_EVENTS_SEND_MESSAGE:    false
      # Logs
      LOG_LEVEL:                ERROR,WARN,INFO
      LOG_BAILEYS:              info
      # Timezone
      TZ:                       ${TIMEZONE:-America/Argentina/Cordoba}
    volumes:
      - evolution_data:/evolution/instances
