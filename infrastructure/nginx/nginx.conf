# ── Concierge AI — Nginx Config ─────────────────────────────
# Reverse proxy for Next.js app + Evolution API

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Performance ───────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    # ── SSL (optional — enable with real certs) ──────────────
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=5r/s;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name concierge.tudominio.com;

        # SSL certificates (place in infrastructure/nginx/ssl/)
        # ssl_certificate /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ── Next.js App ───────────────────────────────────────
        location / {
            limit_req use api;
            proxy_pass http://nextjs:3010;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Evolution API ─────────────────────────────────────
        location /evolution/ {
            limit_req use webhook;
            rewrite ^/evolution/(.*) /$1 break;
            proxy_pass http://evolution-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Webhook (no rate limit — Evolution needs reliable delivery) ──
        location /api/webhooks/ {
            proxy_pass http://nextjs:3010;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        # ── Static assets ─────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs:3010;
            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Health check ──────────────────────────────────────
        location = /api/health {
            proxy_pass http://nextjs:3010;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Deny access to sensitive paths ────────────────────
        location ~ /\.(env|git|next) {
            deny all;
            return 404;
        }
    }
}
